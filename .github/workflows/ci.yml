name: CI

# PR·main 푸시마다 타입체크·테스트를 강제한다. Netlify는 배포상태를 GitHub에 보고하지
# 않으므로(메모리), 깨진 빌드가 손님에게 먼저 노출되던 문제를 이 게이트로 막는다.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 브랜치의 이전 실행은 취소(자원 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # ── 필수 게이트(실패 시 머지 차단) ──
      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      # ── 비차단(정보용) — 현재 lint 부채가 있어 차단하지 않는다.
      #    부채 정리 후 continue-on-error 를 제거해 필수로 승격할 것.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
